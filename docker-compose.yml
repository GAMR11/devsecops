version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devsecops-api
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongouser:mongopass@mongo:27017/devsecops?authSource=admin
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - devsecops-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: devsecops-mongo
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongouser
      - MONGO_INITDB_ROOT_PASSWORD=mongopass
      - MONGO_INITDB_DATABASE=devsecops
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devsecops-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  devsecops-net:
    driver: bridge
